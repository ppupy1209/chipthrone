name: Deploy Backend

# 배포 방식: 이미지를 GHCR에 푸시만 하면, EC2의 watchtower가
# 새 이미지를 60초 주기로 감지해 자동 pull/재시작한다. (SSH 인바운드 불필요)

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-image:
    name: Docker 이미지 빌드·푸시(GHCR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/chipthrone-api:latest
            ghcr.io/${{ github.repository_owner }}/chipthrone-api:${{ github.sha }}
