name: Uptime Monitor

# EC2 바깥(GitHub 러너)에서 서비스 두 진입점을 주기적으로 찔러
# 다운되면 Slack으로 알린다. EC2/Vercel 자원은 전혀 쓰지 않는다.
#   - API(백엔드, EC2):   api.chipthrone.com/api/health
#   - 프론트 도어(Vercel): www.chipthrone.com  ← DNS/SSL/CDN 등 백엔드 핑이 못 보는 사각지대
# (스케줄 워크플로는 기본 브랜치에서만 동작 — main 머지 후부터 실행)

on:
  schedule:
    - cron: "*/5 * * * *" # 5분 주기 (GitHub Actions 최소 간격)
  workflow_dispatch: {} # 수동 실행(설정 직후 테스트용)

permissions:
  contents: read

jobs:
  healthcheck:
    name: 헬스체크(API+프론트) → 실패 시 Slack 알림
    runs-on: ubuntu-latest
    env:
      API_URL: https://api.chipthrone.com/api/health
      WEB_URL: https://www.chipthrone.com
    steps:
      - name: 두 진입점 확인 (각 3회 재시도로 일시 장애 거르기)
        id: probe
        run: |
          set +e
          probe() {
            # $1=라벨 $2=URL → 성공 시 return 0, 실패 시 마지막 코드를 stdout
            local code=000
            for i in 1 2 3; do
              code=$(curl -s -o /dev/null -m 10 -w "%{http_code}" "$2")
              echo "[$1] 시도 $i: HTTP $code" >&2
              [ "$code" = "200" ] && return 0
              sleep 10
            done
            printf '%s' "$code"
            return 1
          }
          fails=""
          if ! c=$(probe "API" "$API_URL"); then fails="${fails}API(${API_URL})=${c} / "; fi
          if ! c=$(probe "WEB" "$WEB_URL"); then fails="${fails}프론트(${WEB_URL})=${c} / "; fi
          if [ -n "$fails" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "fails=${fails% / }" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Slack 알림 (다운 확정 시)
        if: steps.probe.outputs.ok == 'false'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          FAILS: ${{ steps.probe.outputs.fails }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "::warning::SLACK_WEBHOOK_URL 시크릿이 없어 알림을 건너뜀"
            exit 1
          fi
          now=$(date -u +"%Y-%m-%d %H:%M:%SZ")
          # jq로 안전하게 JSON 생성(이스케이프). 제어문자 회피 위해 한 줄 메시지.
          payload=$(jq -nc \
            --arg fails "$FAILS" --arg now "$now" --arg run "$RUN_URL" \
            '{text: ":red_circle: chipthrone 응답 없음 — \($fails) · 확인(UTC): \($now) · 로그: \($run)"}')
          curl -s -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL"

      - name: 다운 시 실행 실패 처리(Actions 탭에 표시)
        if: steps.probe.outputs.ok == 'false'
        run: exit 1
